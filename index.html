<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'ESSENCE | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        html, body { background: #000; margin: 0; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
        #cursor { width: 12px; height: 12px; background: white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <nav class="fixed top-0 w-full z-50 flex justify-between p-8 mix-blend-difference text-white">
        <div class="text-xl font-bold tracking-tighter">L'ESSENCE</div>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:flex">
            <a href="index.html" class="hover:italic transition-all italic underline">Home</a>
            <a href="about.html" class="hover:italic transition-all">About Us</a>
            <a href="story.html" class="hover:italic transition-all">Story</a>
        </div>
    </nav>

    <header style="position:relative; width:100%; height:100vh; overflow:hidden;">
        <iframe src="https://my.spline.design/glassropescopycopy-P5VIvYBxbDos3eOsPexysq7r-1sZ/" frameborder="0" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; z-index:0;"></iframe>
        <div style="position:absolute; bottom:18%; left:50%; transform:translateX(-50%); z-index:10; pointer-events:none; text-align:center;">
            <h2 class="opacity-0 hero-title" style="font-family:'Playfair Display',serif; font-size:clamp(1.6rem, 3.5vw, 3.2rem); color:#000; text-transform:uppercase; letter-spacing:0.15em;">
                Form <span style="font-style:italic;">&amp;</span> Feeling
            </h2>
        </div>
        <div style="position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; z-index:10;">
            <a href="about.html" style="font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.6); text-decoration:none;">Enter Experience</a>
            <div class="scroll-line" style="width:1px; height:4rem; background:white; margin-top:10px;"></div>
        </div>
    </header>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', e => { gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.2 }); });
            gsap.to(".hero-title", { opacity: 1, duration: 2, delay: 1 });
        });
    </script>
</body>
</html>
