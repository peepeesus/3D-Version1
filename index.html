<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'ESSENCE | Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script defer src="https://unpkg.com/lenis@1.2.3/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        html, body { background-color: #f4f4f4; color: #1a1a1a; font-family: 'Inter', sans-serif; overscroll-behavior-y: none; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        html.lenis, html.lenis body { height: auto !important; }
        #cursor { width: 16px; height: 16px; background: white; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; transform: translate(-50%, -50%); transition: width 0.2s ease, height 0.2s ease; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-800 selection:text-white">
    <div id="cursor"></div>
    <nav class="fixed top-0 w-full z-50 flex justify-between p-8 mix-blend-difference text-white">
        <a href="index.html" class="text-xl font-bold tracking-tighter cursor-pointer">L'ESSENCE</a>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:flex">
            <a href="index.html" class="hover:italic transition-all italic">Home</a>
            <a href="story.html" class="hover:italic transition-all">Story</a>
            <a href="about.html" class="hover:italic transition-all">About Us</a>
        </div>
    </nav>

    <section class="h-screen relative overflow-hidden bg-black">
        <iframe src="https://my.spline.design/glassropescopycopy-P5VIvYBxbDos3eOsPexysq7r-1sZ/" frameborder="0" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; z-index:0;"></iframe>
        <div class="absolute inset-0 flex flex-col justify-center items-center z-10 pointer-events-none">
            <h1 class="serif text-[10vw] leading-none text-center opacity-0 hero-title mix-blend-difference text-white">
                Form & <br> <span class="italic">Feeling</span>
            </h1>
        </div>
        <div class="absolute bottom-20 left-1/2 -translate-x-1/2 flex flex-col items-center z-10 gap-4">
            <div class="flex gap-8 pointer-events-auto">
                <a href="story.html" class="text-[10px] uppercase tracking-[0.4em] text-white/70 hover:text-white transition-colors">The Story</a>
                <a href="about.html" class="text-[10px] uppercase tracking-[0.4em] text-white/70 hover:text-white transition-colors">About Us</a>
            </div>
            <div class="w-[1px] h-12 bg-white/30 origin-top scroll-line"></div>
        </div>
    </section>

    <footer class="py-12 text-center bg-black">
        <p class="text-[10px] uppercase tracking-[0.5em] text-zinc-600">&copy; 2026 L'ESSENCE STUDIO</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const lenis = new Lenis({ lerp: 0.1 });
            gsap.ticker.add((time) => { lenis.raf(time * 1000); });
            
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', e => { gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.15 }); });
            
            gsap.to(".hero-title", { opacity: 1, y: 0, duration: 2, ease: "power4.out", delay: 0.5 });
            gsap.from(".scroll-line", { scaleY: 0, duration: 1.5, ease: "power2.inOut", delay: 1 });
        });
    </script>
</body>
</html>
